name: Publish packages to npm

# Publie htsl-engine puis htsl-codemirror sur npm (packages non scopés, publics).
#
# Pré-requis (une seule fois) :
#   1. Créer un token « Automation » sur npmjs.com → Access Tokens.
#   2. L'ajouter en secret de dépôt : Settings → Secrets and variables → Actions
#      → New repository secret → nom NPM_TOKEN.
#
# Déclenché à la publication d'une Release GitHub (ou manuellement). Les versions
# publiées sont celles des package.json — pense à les bumper avant de taguer.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      # htsl-engine construit dist + dist-min via prepublishOnly ; --access public
      # est explicite (sans effet pour un package non scopé, déjà public).
      - run: npm publish -w htsl-engine --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish -w htsl-codemirror --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
