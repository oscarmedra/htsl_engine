<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Démo HTSL (navigateur)</title>
    <!-- Bundle minifié : expose les globals `htsl_engine` et `HTML_ENGINE` -->
    <script src="../dist-min/htsl.global.js"></script>
    <style>
      body { font: 16px/1.5 system-ui, sans-serif; margin: 2rem; }
      textarea { width: 100%; height: 8rem; font-family: monospace; }
      pre { background: #f4f4f5; padding: 1rem; border-radius: 8px; overflow: auto; }
      .out { border: 1px solid #e4e4e7; padding: 1rem; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>HTSL — démo navigateur</h1>
    <p>Tapez du HTSL, le HTML est généré en direct (échappement XSS activé).</p>

    <textarea id="src">{article.post:
  {h1:Bonjour {strong:HTSL}}
  {p:Essai : {code:&lt;script&gt;alert(1)&lt;/script&gt;}}
}</textarea>

    <h3>HTML généré (rendu)</h3>
    <div class="out" id="rendered"></div>

    <h3>HTML généré (source)</h3>
    <pre id="source"></pre>

    <script>
      const srcEl = document.getElementById("src");
      const rendered = document.getElementById("rendered");
      const source = document.getElementById("source");

      function update() {
        try {
          const html = htsl_engine.compile(srcEl.value, { prettyPrint: true });
          rendered.innerHTML = html;
          source.textContent = html;
        } catch (err) {
          source.textContent = String(err.message || err);
        }
      }

      srcEl.addEventListener("input", update);
      update();
    </script>
  </body>
</html>
