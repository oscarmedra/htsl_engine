<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTSL — démo des formules (math.text.*)</title>

    <!-- Moteur HTSL : expose les globals htsl_engine / HTSL_ENGINE -->
    <script src="../dist-min/htsl.global.js"></script>

    <!-- KaTeX (optionnel) : si présent, htsl_engine.compile l'utilise -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>

    <style>
      body {
        font: 16px/1.6 system-ui, sans-serif;
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { margin-bottom: 0.2rem; }
      .sub { color: #71717a; margin-top: 0; }
      .grid { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
      @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
      textarea {
        width: 100%;
        height: 32rem;
        font: 13px/1.5 ui-monospace, monospace;
        padding: 0.75rem;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .panel { border: 1px solid #e4e4e7; border-radius: 8px; padding: 1rem 1.25rem; }
      .status { color: #71717a; font-size: 0.9rem; }
      .err { color: #dc2626; white-space: pre-wrap; font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <h1>HTSL — collection <code>math.text.*</code></h1>
    <p class="sub">
      Édition à gauche, rendu à droite. KaTeX est chargé depuis un CDN ; sans lui,
      le moteur affiche le LaTeX brut.
    </p>

    <!-- Source de demo-formulas.htsl (type non-exécutable) -->
    <script type="text/htsl" id="demo-src">
{!-- Démonstration de la collection math.text.* --}
{h1:Formulations mathématiques HTSL}

{h2:Formules dans le texte}
{p:Avec accolades : {@mti: a^2 + b^2 = c^2}.}
{p:Avec le raccourci dollar : $e^{i\pi} + 1 = 0$.}

{h2:Formule centrée (bloc)}
{@mtb: \sum_{n=1}^{\infty} \frac{1}{n^2} = \frac{\pi^2}{6}}
$$\int_0^1 x^2 \, dx = \frac{1}{3}$$

{h2:Équations numérotées et références}
{@mte[label=euler]: e^{i\pi} + 1 = 0}
{@mte[label=mass]: E = mc^2}
{p:L'identité d'Euler {@mtr[to=euler]/} et la relation {@mtr[to=mass]/} sont célèbres.}

{h2:Objets imbriqués (résolus en LaTeX)}
{@mtb: {@mof:{num:1}{den:2}} \cdot {@mc.pi/}}

{h2:Équations alignées}
{@mta:
  {line: (a+b)^2 &= a^2 + 2ab + b^2}
  {line: &= a^2 + b^2 + 2ab}
}

{h2:Définition par cas}
{@mtc[intro="|x|"]:
  {case: x & si x \geq 0}
  {case: -x & si x < 0}
}

{h2:Système d'équations}
{@mts:
  {line: 2x + y = 5}
  {line: x - y = 1}
}
    </script>

    <div class="grid">
      <div>
        <textarea id="src" spellcheck="false"></textarea>
      </div>
      <div class="panel" id="out"></div>
    </div>
    <p class="status" id="status"></p>

    <script>
      // Inject the engine's default math stylesheet.
      const style = document.createElement("style");
      style.textContent = htsl_engine.mathCss;
      document.head.appendChild(style);

      const srcEl = document.getElementById("src");
      const out = document.getElementById("out");
      const status = document.getElementById("status");

      // Seed the editor with the embedded demo source.
      srcEl.value = document.getElementById("demo-src").textContent.trim();

      function render() {
        try {
          const html = htsl_engine.compile(srcEl.value, {
            prettyPrint: false,
            katex: window.katex, // undefined until KaTeX finishes loading → raw fallback
          });
          out.innerHTML = html;
          status.textContent = window.katex
            ? "Rendu avec KaTeX ✓"
            : "KaTeX non chargé — affichage du LaTeX brut.";
          status.className = "status";
        } catch (err) {
          out.innerHTML = "";
          status.textContent = String((err && err.message) || err);
          status.className = "err";
        }
      }

      srcEl.addEventListener("input", render);
      // Re-render once KaTeX has loaded so formulas upgrade from raw → typeset.
      window.addEventListener("load", render);
      render();
    </script>
  </body>
</html>
