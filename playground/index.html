<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTSL · Playground</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">HTSL</span>
          <span class="tagline">playground</span>
          <label class="toggle" title="Afficher/masquer l'éditeur de code">
            <input type="checkbox" id="toggle-editor" checked /> Éditeur
          </label>
        </div>
        <div class="toolbar">
          <button id="btn-insert" class="primary" title="Palette d'insertion (ou tapez / en début de ligne)">➕ Insérer</button>
          <a id="btn-docs" class="btn-link" href="documentation.html" target="_blank" rel="noopener" title="Documentation complète : intégrations, objets, prompt IA">📖 Documentation</a>
          <button id="btn-copy" title="Copier le HTML rendu">Copier HTML</button>
          <button id="btn-download" title="Télécharger le .htsl">Télécharger</button>
          <button id="btn-pdf" title="Exporter le rendu en PDF (boîte d'impression → Enregistrer au format PDF)">PDF</button>
          <button id="btn-share" title="Copier un lien de partage">Partager</button>
          <label class="toggle"><input type="checkbox" id="toggle-ast" /> AST</label>
        </div>
      </header>

      <div id="banner" class="banner" hidden></div>

      <main id="panels">
        <section class="panel" id="panel-editor">
          <div class="panel-head">Éditeur HTSL</div>
          <div id="editor" class="panel-body"></div>
          <div id="help" class="help" hidden></div>
        </section>
        <div class="gutter" data-gutter="1"></div>
        <section class="panel" id="panel-render">
          <div class="panel-head">Rendu <span class="hint">(iframe isolée · vos {link}/{script} y sont chargés)</span><span id="perf" class="perf"></span></div>
          <iframe id="render" class="panel-body render-frame" title="rendu HTSL"></iframe>
        </section>
        <div class="gutter" data-gutter="2"></div>
        <section class="panel" id="panel-ast">
          <div class="panel-head">AST</div>
          <pre id="ast" class="panel-body ast"></pre>
        </section>
      </main>

      <!-- Palette d'insertion (drawer) -->
      <aside id="palette" class="palette" hidden>
        <div class="palette-head">
          <strong>Insérer</strong>
          <input id="palette-search" type="search" placeholder="Rechercher (titre, équation, scène…)" autocomplete="off" />
          <button id="palette-close" title="Fermer">✕</button>
        </div>
        <div id="palette-list" class="palette-list"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
